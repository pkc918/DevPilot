name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    env:
      APP_NAME: DevPilot
      DERIVED_DATA: .build/DerivedData
      SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY || secrets.SPARKLE_PUBLIC_ED_KEY }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare release metadata
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ -z "$SPARKLE_PUBLIC_ED_KEY" ]]; then
            echo "::error::Missing SPARKLE_PUBLIC_ED_KEY. Add it as a repository variable or repository secret."
            exit 1
          fi
          if [[ -z "$SPARKLE_PRIVATE_KEY" ]]; then
            echo "::error::Missing repository secret SPARKLE_PRIVATE_KEY"
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          echo "FEED_URL=https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/appcast.xml" >> "$GITHUB_ENV"
          echo "DOWNLOAD_URL_PREFIX=https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project DevPilot.xcodeproj \
            -scheme DevPilot \
            -derivedDataPath "$DERIVED_DATA"

      - name: Build archive
        run: |
          xcodebuild archive \
            -project DevPilot.xcodeproj \
            -scheme DevPilot \
            -configuration Release \
            -archivePath "$APP_NAME.xcarchive" \
            -derivedDataPath "$DERIVED_DATA" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            SPARKLE_FEED_URL="$FEED_URL" \
            SPARKLE_PUBLIC_ED_KEY="$SPARKLE_PUBLIC_ED_KEY" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES

      - name: Package DMG and update ZIP
        run: |
          app_path="$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app"
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "release/$APP_NAME-$GITHUB_REF_NAME.zip"
          script/package_dmg.sh "$app_path" "release/$APP_NAME-$GITHUB_REF_NAME.dmg" "$APP_NAME"

      - name: Generate Sparkle appcast
        run: |
          sparkle_bin="$(find "$DERIVED_DATA/SourcePackages/artifacts" -path "*/Sparkle/bin" -type d | head -n 1)"
          if [[ -z "$sparkle_bin" ]]; then
            echo "::error::Sparkle tools not found in $DERIVED_DATA"
            exit 1
          fi

          mkdir -p appcast
          cp "release/$APP_NAME-$GITHUB_REF_NAME.zip" appcast/
          printf "%s" "$SPARKLE_PRIVATE_KEY" | "$sparkle_bin/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_URL_PREFIX" \
            appcast
          cp appcast/appcast.xml release/appcast.xml

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/DevPilot-${{ github.ref_name }}.dmg
            release/DevPilot-${{ github.ref_name }}.zip
            release/appcast.xml
          generate_release_notes: true

      - name: Calculate Homebrew cask sha256
        id: homebrew
        run: |
          dmg_path="release/$APP_NAME-$GITHUB_REF_NAME.dmg"
          sha256="$(shasum -a 256 "$dmg_path" | awk '{print $1}')"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"

      - name: Validate Homebrew tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "$HOMEBREW_TAP_TOKEN" ]]; then
            echo "::error::Missing repository secret HOMEBREW_TAP_TOKEN. It must have Contents read/write access to pkc918/homebrew-tap."
            exit 1
          fi

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: pkc918/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew cask
        working-directory: homebrew-tap
        env:
          CASK_VERSION: ${{ env.VERSION }}
          CASK_SHA256: ${{ steps.homebrew.outputs.sha256 }}
        run: |
          if [[ -z "$CASK_VERSION" || -z "$CASK_SHA256" ]]; then
            echo "::error::Missing cask version or sha256"
            exit 1
          fi

          cask_file="Casks/devpilot.rb"
          ruby -pi -e '$_.sub!(/version "[^"]+"/, "version \"#{ENV.fetch(%q[CASK_VERSION])}\""); $_.sub!(/sha256 "[^"]+"/, "sha256 \"#{ENV.fetch(%q[CASK_SHA256])}\"")' "$cask_file"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "$cask_file"; then
            echo "Homebrew cask is already up to date."
            exit 0
          fi

          git add "$cask_file"
          git commit -m "Update DevPilot to $CASK_VERSION"
          git push
